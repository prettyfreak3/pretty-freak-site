<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Freak</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    .hero {
      height: 100vh;
      background: url('hero.jpg') center center / cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      text-align: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>Pretty Freak</h1>
      <p>Launching Soon</p>
    </div>
  </div>

</body>
</html>
